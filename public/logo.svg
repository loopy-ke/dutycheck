<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Duty Check">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="80" height="80" rx="22" fill="url(#a)"/>
  <!-- speedometer dial arc -->
  <path d="M26 65a24 24 0 1 1 44 0" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.32"/>
  <!-- dial ticks -->
  <g stroke="#ffffff" stroke-width="4.2" stroke-linecap="round" opacity="0.5">
    <path d="M27 50l5 1.8"/>
    <path d="M34 38l3.6 3.8"/>
    <path d="M62 38l-3.6 3.8"/>
    <path d="M69 50l-5 1.8"/>
  </g>
  <!-- needle that reads as a checkmark, pivoting from the dial center -->
  <path d="M40 61l8.5 8.5 22.5-27" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="48" cy="69" r="5" fill="#0f0e0d"/>
</svg>
